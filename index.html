<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque da Papelaria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-card">
      <div class="loading-spinner-grande"></div>
      <p class="loading-msg" id="loadingMsg">Carregando...</p>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="header-badge">📎 Papelaria</div>
      <h1>Estoque</h1>
      <p class="subtitulo">Controle simples e prático dos seus produtos</p>
    </div>

    <!-- Formulário -->
    <div class="card">
      <h2>Novo Produto</h2>
      <div class="formulario">

        <input type="text" id="nomeProduto" placeholder="Nome do produto">

        <input type="number" id="quantidadeProduto" placeholder="Quantidade inicial" min="1">

        <!-- Upload de imagem -->
        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept="image/*">
          <div class="upload-placeholder">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">
              <strong>Clique para enviar</strong> uma foto do produto<br>
              <span>JPG, PNG, WEBP</span>
            </div>
          </div>
          <img class="upload-preview" id="uploadPreview" alt="Preview">
        </div>

        <button class="btn-primary" id="btnAdicionar" onclick="adicionarProduto()">
          <div class="spinner" id="btnSpinner"></div>
          <span id="btnText">Adicionar Produto</span>
        </button>

      </div>
    </div>

    <!-- Resumo -->
    <div class="card">
      <h2>Resumo do Estoque</h2>
      <div class="resumo-grid">
        <div class="resumo-item">
          <div class="resumo-label">Produtos</div>
          <div class="resumo-valor" id="totalProdutos">—</div>
        </div>
        <div class="resumo-item">
          <div class="resumo-label">Total de itens</div>
          <div class="resumo-valor" id="totalItens">—</div>
        </div>
      </div>
    </div>

    <!-- Lista -->
    <div class="card">
      <h2>Produtos no Estoque</h2>
      <ul id="listaProdutos"></ul>
    </div>

  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBnFxoOAIn_k1_kWiW0rv7uD2SWsgQytxM",
      authDomain: "estoque-papelaria.firebaseapp.com",
      projectId: "estoque-papelaria",
      storageBucket: "estoque-papelaria.firebasestorage.app",
      messagingSenderId: "406503306850",
      appId: "1:406503306850:web:f6c86c32c328fd896f033b"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
  </script>

  <script src="script.js" type="module"></script>

</body>
</html>
